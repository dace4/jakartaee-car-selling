<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:h="jakarta.faces.html">

<ui:composition template="/WEB-INF/templates/BasicTemplate.xhtml">
    <ui:define name="title">Car Selling Home</ui:define>
    <ui:define name="content">
        <h2>Overview</h2>
        <p>Current data available in the car selling information system.</p>

        <h:panelGrid columns="2" cellpadding="8" style="margin-bottom:20px;">
            <h:outputText value="Cars" />
            <h:outputText value="#{carSellingBean.cars.size()}" />
            <h:outputText value="Sellers" />
            <h:outputText value="#{carSellingBean.sellers.size()}" />
            <h:outputText value="Buyers" />
            <h:outputText value="#{carSellingBean.buyers.size()}" />
            <h:outputText value="Accounts" />
            <h:outputText value="#{carSellingBean.accounts.size()}" />
        </h:panelGrid>

        <h:form>
            <h:commandButton value="Refresh data" action="#{carSellingBean.refresh}" />
            <h:outputText value=" #{carSellingBean.message}" rendered="#{not empty carSellingBean.message}" />
            <br />
            <br />
            <h:commandLink action="carInventory">
                <h:outputText value="View car inventory" />
            </h:commandLink>
            <br />
            <h:commandLink action="participants">
                <h:outputText value="View owners, buyers and reference data" />
            </h:commandLink>
        </h:form>
    </ui:define>
</ui:composition>
</html>
